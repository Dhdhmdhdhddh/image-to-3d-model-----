name: Unzip and commit

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  unzip-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Unzip archive and move files to repo root
        run: |
          set -e
          if [ ! -f "image_to_3d_repo.zip" ]; then
            echo "ERROR: image_to_3d_repo.zip not found in repository root"
            ls -la
            exit 1
          fi
          mkdir -p tmp_unzip
          unzip -o image_to_3d_repo.zip -d tmp_unzip
          if [ -d tmp_unzip/repo ]; then
            # Copy contents of the top-level repo/ into repository root, preserving dotfiles but excluding .git
            shopt -s dotglob || true
            rsync -a --exclude='.git' tmp_unzip/repo/ ./
          else
            echo "ERROR: expected tmp_unzip/repo/ directory not found"
            ls -la tmp_unzip
            exit 1
          fi
          rm -rf tmp_unzip

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Unpack image_to_3d_repo.zip into repository root (automated)"
          git push origin HEAD
