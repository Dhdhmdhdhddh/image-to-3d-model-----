<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>3D Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080c14; color: #c8d4e8; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  #drop-zone {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 10;
    background: #080c14;
    transition: opacity 0.4s;
  }
  #drop-zone.hidden { opacity: 0; pointer-events: none; }
  #drop-zone h1 { font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; color: #4a6080; margin-bottom: 40px; }
  #drop-zone .box {
    border: 1px solid #1e3050; width: 340px; height: 220px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; cursor: pointer; transition: border-color 0.2s, background 0.2s;
    background: #0c1420;
  }
  #drop-zone .box:hover, #drop-zone .box.drag-over { border-color: #3a7fff; background: #0f1e35; }
  #drop-zone .icon { font-size: 36px; opacity: 0.6; }
  #drop-zone .label { font-size: 12px; color: #4a6080; letter-spacing: 0.1em; }
  #drop-zone .formats { font-size: 11px; color: #2a4060; margin-top: 4px; }
  #file-input { display: none; }

  #canvas { display: block; width: 100%; height: 100%; }

  #hud {
    position: fixed; bottom: 20px; left: 20px;
    font-size: 11px; color: #2a4060; letter-spacing: 0.05em; line-height: 2;
    pointer-events: none;
  }
  #filename {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: #3a5070; pointer-events: none; display: none;
  }
  #stats {
    position: fixed; top: 20px; right: 20px;
    font-size: 11px; color: #2a4060; text-align: right; line-height: 1.8;
    pointer-events: none; display: none;
  }
  #reset-btn {
    position: fixed; top: 20px; left: 20px; font-family: inherit;
    font-size: 11px; letter-spacing: 0.1em; color: #2a4060;
    background: none; border: 1px solid #1e3050; padding: 6px 12px;
    cursor: pointer; display: none; text-transform: uppercase;
    transition: color 0.2s, border-color 0.2s;
  }
  #reset-btn:hover { color: #c8d4e8; border-color: #3a7fff; }
  #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #ff4444; font-size: 13px; display: none; text-align: center; line-height: 2; }
</style>
</head>
<body>

<div id="drop-zone">
  <h1>Claude 3D Viewer</h1>
  <div class="box" id="drop-box">
    <div class="icon">⬡</div>
    <div class="label">drop file or click to browse</div>
    <div class="formats">GLB · GLTF · OBJ · STL</div>
  </div>
</div>

<input type="file" id="file-input" accept=".glb,.gltf,.obj,.stl">
<canvas id="canvas"></canvas>
<div id="hud">drag · rotate&nbsp;&nbsp;&nbsp;scroll · zoom&nbsp;&nbsp;&nbsp;right drag · pan</div>
<div id="filename"></div>
<div id="stats"></div>
<button id="reset-btn" onclick="resetView()">↩ load new</button>
<div id="error"></div>

<script>
const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl');
if (!gl) alert('WebGL not supported');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; gl.viewport(0,0,canvas.width,canvas.height); }
window.addEventListener('resize', resize); resize();

// ── DRAG & DROP ──
const dropZone = document.getElementById('drop-zone');
const dropBox = document.getElementById('drop-box');
const fileInput = document.getElementById('file-input');

dropBox.onclick = () => fileInput.click();
fileInput.onchange = e => loadFile(e.target.files[0]);

dropBox.addEventListener('dragover', e => { e.preventDefault(); dropBox.classList.add('drag-over'); });
dropBox.addEventListener('dragleave', () => dropBox.classList.remove('drag-over'));
dropBox.addEventListener('drop', e => { e.preventDefault(); dropBox.classList.remove('drag-over'); loadFile(e.dataTransfer.files[0]); });

function showError(msg) {
  const el = document.getElementById('error');
  el.innerHTML = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function resetView() {
  dropZone.classList.remove('hidden');
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('filename').style.display = 'none';
  document.getElementById('stats').style.display = 'none';
  clearMesh();
}

// ── SHADER ──
const vsrc = `
attribute vec3 aPos; attribute vec3 aNorm;
uniform mat4 uMVP; uniform mat4 uModel;
varying vec3 vN; varying vec3 vP;
void main() { gl_Position = uMVP * vec4(aPos,1); vN = mat3(uModel)*aNorm; vP = (uModel*vec4(aPos,1)).xyz; }`;

const fsrc = `
precision mediump float;
varying vec3 vN; varying vec3 vP;
uniform vec3 uColor;
void main() {
  vec3 n = normalize(vN);
  vec3 l1 = normalize(vec3(1.5,2.0,1.0));
  vec3 l2 = normalize(vec3(-1.0,-0.5,-0.8));
  float d1 = max(dot(n,l1),0.0);
  float d2 = max(dot(n,l2),0.0)*0.25;
  vec3 view = normalize(-vP);
  float rim = pow(1.0-max(dot(n,view),0.0),3.0);
  vec3 col = uColor*(0.12+d1*0.88+d2) + vec3(0.15,0.35,0.9)*rim*0.5;
  gl_FragColor = vec4(col,1);
}`;

function mkShader(src,type){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
const prog = gl.createProgram();
gl.attachShader(prog,mkShader(vsrc,gl.VERTEX_SHADER));
gl.attachShader(prog,mkShader(fsrc,gl.FRAGMENT_SHADER));
gl.linkProgram(prog); gl.useProgram(prog);
const aPos=gl.getAttribLocation(prog,'aPos');
const aNorm=gl.getAttribLocation(prog,'aNorm');
const uMVP=gl.getUniformLocation(prog,'uMVP');
const uModel=gl.getUniformLocation(prog,'uModel');
const uColor=gl.getUniformLocation(prog,'uColor');

// ── MESH STATE ──
let posBuf=null,normBuf=null,idxBuf=null,drawCount=0,drawIndexed=false;
function clearMesh(){posBuf=normBuf=idxBuf=null;drawCount=0;}

function uploadMesh(positions, normals, indices) {
  posBuf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,posBuf); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(positions),gl.STATIC_DRAW);
  normBuf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,normBuf); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(normals),gl.STATIC_DRAW);
  if(indices&&indices.length){
    idxBuf=gl.createBuffer(); gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,idxBuf); gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint32Array(indices),gl.STATIC_DRAW);
    drawCount=indices.length; drawIndexed=true;
  } else { drawCount=positions.length/3; drawIndexed=false; }
  document.getElementById('stats').innerHTML = `${(positions.length/3).toLocaleString()} verts<br>${Math.floor(drawCount/3).toLocaleString()} tris`;
  document.getElementById('stats').style.display='block';
}

// ── FILE LOADING ──
function loadFile(file) {
  if(!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  document.getElementById('filename').textContent = file.name;
  document.getElementById('filename').style.display = 'block';
  const reader = new FileReader();

  if(ext==='glb') { reader.onload=e=>parseGLB(e.target.result); reader.readAsArrayBuffer(file); }
  else if(ext==='gltf') { reader.onload=e=>parseGLTF(JSON.parse(e.target.result)); reader.readAsText(file); }
  else if(ext==='obj') { reader.onload=e=>parseOBJ(e.target.result); reader.readAsText(file); }
  else if(ext==='stl') { reader.onload=e=>parseSTL(e.target.result); reader.readAsArrayBuffer(file); }
  else { showError('Unsupported format.<br>Use GLB, GLTF, OBJ, or STL.'); return; }

  dropZone.classList.add('hidden');
  document.getElementById('reset-btn').style.display='block';
}

// ── GLB PARSER ──
function parseGLB(buffer) {
  try {
    const v = new DataView(buffer);
    const jsonLen = v.getUint32(12,true);
    const gltf = JSON.parse(new TextDecoder().decode(new Uint8Array(buffer,20,jsonLen)));
    const binStart = 20+jsonLen+8;
    const bin = new Uint8Array(buffer, binStart);
    parseGLTFWithBin(gltf, bin);
  } catch(e) { showError('Failed to parse GLB: '+e.message); }
}

function parseGLTF(gltf) {
  if(gltf.buffers && gltf.buffers[0] && gltf.buffers[0].uri) {
    const b64 = gltf.buffers[0].uri.split(',')[1];
    const bin = Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
    parseGLTFWithBin(gltf, bin);
  } else { parseGLTFWithBin(gltf, new Uint8Array(0)); }
}

function parseGLTFWithBin(gltf, bin) {
  const mesh = gltf.meshes[0].primitives[0];
  function getAcc(idx) {
    const acc=gltf.accessors[idx], bv=gltf.bufferViews[acc.bufferView];
    const off=(bv.byteOffset||0)+(acc.byteOffset||0);
    const n=acc.count*(acc.type==='VEC3'?3:acc.type==='VEC2'?2:1);
    if(acc.componentType===5126) return new Float32Array(bin.buffer,bin.byteOffset+off,n);
    if(acc.componentType===5123) return Array.from(new Uint16Array(bin.buffer,bin.byteOffset+off,n));
    if(acc.componentType===5125) return Array.from(new Uint32Array(bin.buffer,bin.byteOffset+off,n));
  }
  const pos=getAcc(mesh.attributes.POSITION);
  const nor=mesh.attributes.NORMAL!=null?getAcc(mesh.attributes.NORMAL):computeNormals(Array.from(pos),mesh.indices!=null?Array.from(getAcc(mesh.indices)):null);
  const idx=mesh.indices!=null?Array.from(getAcc(mesh.indices)):null;
  centerAndScale(Array.from(pos));
  uploadMesh(Array.from(pos),Array.from(nor),idx);
}

// ── OBJ PARSER ──
function parseOBJ(text) {
  const verts=[], texcoords=[], normsRaw=[], positions=[], normals=[], indices=[];
  for(const line of text.split('\n')) {
    const p=line.trim().split(/\s+/);
    if(p[0]==='v') verts.push([+p[1],+p[2],+p[3]]);
    else if(p[0]==='vn') normsRaw.push([+p[1],+p[2],+p[3]]);
    else if(p[0]==='f') {
      const face=p.slice(1).map(s=>{ const t=s.split('/'); return {v:+t[0]-1,n:t[2]?+t[2]-1:-1}; });
      for(let i=1;i<face.length-1;i++) {
        for(const fi of [face[0],face[i],face[i+1]]) {
          indices.push(positions.length/3);
          positions.push(...verts[fi.v]);
          normals.push(...(fi.n>=0&&normsRaw[fi.n]?normsRaw[fi.n]:[0,1,0]));
        }
      }
    }
  }
  if(positions.length===0){showError('No geometry found in OBJ.');return;}
  if(normsRaw.length===0) { const cn=computeNormals(positions,null); normals.splice(0); normals.push(...cn); }
  centerAndScale(positions);
  uploadMesh(positions,normals,null);
}

// ── STL PARSER ──
function parseSTL(buffer) {
  const positions=[], normals=[];
  // Try binary first
  const v=new DataView(buffer);
  const numTris=v.getUint32(80,true);
  if(80+4+numTris*50<=buffer.byteLength && numTris>0) {
    for(let i=0;i<numTris;i++) {
      const off=84+i*50;
      const nx=v.getFloat32(off,true),ny=v.getFloat32(off+4,true),nz=v.getFloat32(off+8,true);
      for(let j=0;j<3;j++) {
        const o=off+12+j*12;
        positions.push(v.getFloat32(o,true),v.getFloat32(o+4,true),v.getFloat32(o+8,true));
        normals.push(nx,ny,nz);
      }
    }
  } else {
    // ASCII
    const text=new TextDecoder().decode(buffer);
    const lines=text.split('\n');
    let cn=[0,0,1];
    for(const line of lines) {
      const p=line.trim().split(/\s+/);
      if(p[0]==='facet'&&p[1]==='normal') cn=[+p[2],+p[3],+p[4]];
      else if(p[0]==='vertex') { positions.push(+p[1],+p[2],+p[3]); normals.push(...cn); }
    }
  }
  if(positions.length===0){showError('No geometry found in STL.');return;}
  centerAndScale(positions);
  uploadMesh(positions,normals,null);
}

// ── HELPERS ──
function centerAndScale(pos) {
  let minX=Infinity,minY=Infinity,minZ=Infinity,maxX=-Infinity,maxY=-Infinity,maxZ=-Infinity;
  for(let i=0;i<pos.length;i+=3){minX=Math.min(minX,pos[i]);maxX=Math.max(maxX,pos[i]);minY=Math.min(minY,pos[i+1]);maxY=Math.max(maxY,pos[i+1]);minZ=Math.min(minZ,pos[i+2]);maxZ=Math.max(maxZ,pos[i+2]);}
  const cx=(minX+maxX)/2,cy=(minY+maxY)/2,cz=(minZ+maxZ)/2;
  const scale=2/Math.max(maxX-minX,maxY-minY,maxZ-minZ,0.001);
  for(let i=0;i<pos.length;i+=3){pos[i]=(pos[i]-cx)*scale;pos[i+1]=(pos[i+1]-cy)*scale;pos[i+2]=(pos[i+2]-cz)*scale;}
}

function computeNormals(pos, idx) {
  const n=new Float32Array(pos.length);
  const tris=idx||Array.from({length:pos.length/3},(_,i)=>i);
  for(let i=0;i<tris.length;i+=3){
    const ai=tris[i]*3,bi=tris[i+1]*3,ci=tris[i+2]*3;
    const ax=pos[bi]-pos[ai],ay=pos[bi+1]-pos[ai+1],az=pos[bi+2]-pos[ai+2];
    const bx=pos[ci]-pos[ai],by=pos[ci+1]-pos[ai+1],bz=pos[ci+2]-pos[ai+2];
    const nx=ay*bz-az*by,ny=az*bx-ax*bz,nz=ax*by-ay*bx;
    for(const vi of [tris[i],tris[i+1],tris[i+2]]){n[vi*3]+=nx;n[vi*3+1]+=ny;n[vi*3+2]+=nz;}
  }
  for(let i=0;i<n.length;i+=3){const l=Math.sqrt(n[i]**2+n[i+1]**2+n[i+2]**2)||1;n[i]/=l;n[i+1]/=l;n[i+2]/=l;}
  return n;
}

// ── CAMERA ──
let rotX=0.4,rotY=0.3,zoom=4,panX=0,panY=0;
let drag=false,rdrag=false,lx=0,ly=0;

canvas.addEventListener('mousedown',e=>{if(e.button===0)drag=true;if(e.button===2)rdrag=true;lx=e.clientX;ly=e.clientY;});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('mouseup',()=>{drag=false;rdrag=false;});
window.addEventListener('mousemove',e=>{
  if(drag){rotY+=(e.clientX-lx)*0.008;rotX+=(e.clientY-ly)*0.008;}
  if(rdrag){panX+=(e.clientX-lx)*0.004;panY-=(e.clientY-ly)*0.004;}
  lx=e.clientX;ly=e.clientY;
});
canvas.addEventListener('wheel',e=>{zoom*=1+e.deltaY*0.001;zoom=Math.max(0.5,Math.min(20,zoom));});

let tp={};
canvas.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.touches)tp[t.identifier]={x:t.clientX,y:t.clientY};},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1){const t=e.touches[0];if(tp[t.identifier]){rotY+=(t.clientX-tp[t.identifier].x)*0.01;rotX+=(t.clientY-tp[t.identifier].y)*0.01;}tp[t.identifier]={x:t.clientX,y:t.clientY};}
},{passive:false});

// ── MATRIX MATH ──
function mat4(){return new Float32Array(16);}
function identity(m){m.fill(0);m[0]=m[5]=m[10]=m[15]=1;return m;}
function perspective(m,fov,asp,n,f){m.fill(0);const t=1/Math.tan(fov/2);m[0]=t/asp;m[5]=t;m[10]=(f+n)/(n-f);m[11]=-1;m[14]=2*f*n/(n-f);return m;}
function multiply(o,a,b){for(let i=0;i<4;i++)for(let j=0;j<4;j++){o[j*4+i]=0;for(let k=0;k<4;k++)o[j*4+i]+=a[k*4+i]*b[j*4+k];}return o;}
function rxMat(m,a){identity(m);m[5]=Math.cos(a);m[6]=Math.sin(a);m[9]=-Math.sin(a);m[10]=Math.cos(a);return m;}
function ryMat(m,a){identity(m);m[0]=Math.cos(a);m[2]=-Math.sin(a);m[8]=Math.sin(a);m[10]=Math.cos(a);return m;}

const proj=mat4(),rx_=mat4(),ry_=mat4(),model=mat4(),mvp=mat4();

function render() {
  gl.clearColor(0.031,0.047,0.078,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);

  if(!posBuf){requestAnimationFrame(render);return;}

  perspective(proj,Math.PI/4,canvas.width/canvas.height,0.01,100);
  rxMat(rx_,rotX); ryMat(ry_,rotY);
  multiply(model,ry_,rx_);
  model[12]=panX; model[13]=panY; model[14]=-zoom;
  multiply(mvp,proj,model);

  gl.uniformMatrix4fv(uMVP,false,mvp);
  gl.uniformMatrix4fv(uModel,false,model);
  gl.uniform3f(uColor,0.25,0.55,1.0);

  gl.bindBuffer(gl.ARRAY_BUFFER,posBuf);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,0,0);

  gl.bindBuffer(gl.ARRAY_BUFFER,normBuf);
  gl.enableVertexAttribArray(aNorm);
  gl.vertexAttribPointer(aNorm,3,gl.FLOAT,false,0,0);

  if(drawIndexed){
    const ext=gl.getExtension('OES_element_index_uint');
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,idxBuf);
    gl.drawElements(gl.TRIANGLES,drawCount,gl.UNSIGNED_INT,0);
  } else {
    gl.drawArrays(gl.TRIANGLES,0,drawCount);
  }

  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
